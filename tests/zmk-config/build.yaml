    board: xiao_ble//zmk
    shield: tester_xiao

  - artifact: module_active_layer_notify_board_with_rpc
    board: xiao_ble//zmk
    shield: tester_xiao
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_ACTIVE_LAYER_NOTIFY=y -DCONFIG_ZMK_ACTIVE_LAYER_NOTIFY_STUDIO_RPC=y
