  - artifact: custom_settings_board
    board: xiao_ble//zmk
    shield: tester_xiao
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_ACTIVE_LAYER_NOTIFY=y -DCONFIG_ZMK_ACTIVE_LAYER_NOTIFY_STUDIO_RPC=y -DCONFIG_ZMK_CUSTOM_SETTINGS=y -DCONFIG_ZMK_CUSTOM_SETTINGS_STUDIO_RPC=y
    snippet: studio-rpc-usb-uart
